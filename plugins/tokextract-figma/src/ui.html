<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tokextract</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, system-ui, sans-serif;
      font-size: 12px;
    }
    body { margin: 0; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    h1 { font-size: 14px; margin: 0; }
    p.lede { margin: 0; opacity: 0.7; }
    label { display: flex; flex-direction: column; gap: 4px; font-weight: 600; }
    label small { font-weight: 400; opacity: 0.6; }
    input[type="text"], textarea {
      font: inherit;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid rgba(127, 127, 127, 0.4);
      background: transparent;
      color: inherit;
    }
    textarea { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 11px; resize: vertical; min-height: 200px; }
    .row { display: flex; gap: 8px; align-items: center; }
    button {
      font: inherit;
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      background: #18a0fb;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #0d8ee0; }
    #status { font-size: 11px; opacity: 0.85; min-height: 16px; }
    details { font-size: 11px; }
    pre { white-space: pre-wrap; max-height: 200px; overflow: auto; background: rgba(127,127,127,0.1); padding: 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Tokextract</h1>
  <p class="lede">Paste a <code>tokens.json</code> generated by Tokextract to import it as Figma Variables and styles.</p>

  <label>Collection name <small>variables will live in this collection</small>
    <input type="text" id="collection" value="Tokextract" />
  </label>

  <label>tokens.json
    <textarea id="json" placeholder="Paste DTCG 2025.10 JSON here…"></textarea>
  </label>

  <div class="row">
    <input type="file" id="file" accept="application/json,.json" />
    <label class="row" style="flex-direction: row; font-weight: 400;">
      <input type="checkbox" id="build-spec" checked /> Generate spec page
    </label>
  </div>

  <button id="import">Import tokens</button>
  <div id="status"></div>

  <script src="ui.js"></script>
</body>
</html>
